<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 100" role="img" aria-labelledby="title desc">
    <title id="title">Scientific Calculator logo</title>
    <desc id="desc">A glass scientific calculator with glowing math controls.</desc>
    <defs>
        <linearGradient id="bg" x1="10" y1="8" x2="130" y2="92" gradientUnits="userSpaceOnUse">
            <stop stop-color="#0b1220"/>
            <stop offset="0.45" stop-color="#164e63"/>
            <stop offset="1" stop-color="#f97316"/>
        </linearGradient>
        <linearGradient id="calc" x1="47" y1="16" x2="94" y2="84" gradientUnits="userSpaceOnUse">
            <stop stop-color="#f8fafc" stop-opacity="0.96"/>
            <stop offset="0.58" stop-color="#7dd3fc" stop-opacity="0.9"/>
            <stop offset="1" stop-color="#fb923c" stop-opacity="0.9"/>
        </linearGradient>
        <radialGradient id="glow" cx="48%" cy="42%" r="62%">
