<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-1: #0b1220;
            --bg-2: #1e293b;
            --blob-a: #22d3ee;
            --blob-b: #f97316;
            --panel: rgba(15, 23, 42, 0.62);
            --panel-border: rgba(148, 163, 184, 0.28);
            --text: #e2e8f0;
            --muted: #94a3b8;
            --btn: rgba(148, 163, 184, 0.18);
            --btn-hover: rgba(148, 163, 184, 0.35);
            --op: rgba(34, 211, 238, 0.25);
            --fn: rgba(251, 146, 60, 0.25);
            --danger: #dc2626;
            --equal: #16a34a;
        }

        * {
            box-sizing: border-box;
            font-family: "Outfit", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 15% 20%, #1d4ed8 0%, transparent 34%),
                        radial-gradient(circle at 82% 85%, #ea580c 0%, transparent 32%),
                        linear-gradient(140deg, var(--bg-1), var(--bg-2));
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        body::before,
        body::after {
            content: "";
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            opacity: 0.55;
            z-index: 0;
            animation: drift 9s ease-in-out infinite;
        }

        body::before {
            width: 280px;
            height: 280px;
            background: var(--blob-a);
            top: -70px;
            left: -55px;
        }

        body::after {
            width: 340px;
            height: 340px;
            background: var(--blob-b);
            right: -120px;
            bottom: -100px;
            animation-delay: 1.5s;
        }

        @keyframes drift {
            0% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-24px) scale(1.08);
            }
            100% {
                transform: translateY(0) scale(1);
            }
        }

        .calculator {
            width: min(380px, 94vw);
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 22px 55px rgba(2, 6, 23, 0.5);
            backdrop-filter: blur(14px);
            position: relative;
            z-index: 1;
        }

        .title {
            margin: 0 0 10px;
            font-family: "Space Grotesk", sans-serif;
            letter-spacing: 0.7px;
            font-size: 21px;
            font-weight: 700;
            text-align: center;
            color: var(--text);
        }

        .display {
            width: 100%;
            height: 58px;
            border: 1px solid rgba(148, 163, 184, 0.26);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 22px;
            text-align: right;
            margin-bottom: 12px;
            color: #f8fafc;
            background: rgba(15, 23, 42, 0.64);
            box-shadow: inset 0 0 0 1px rgba(56, 189, 248, 0.1);
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            background: var(--btn);
            color: var(--text);
            transition: transform 0.14s ease, background-color 0.14s ease;
        }

        button:hover {
            background: var(--btn-hover);
            transform: translateY(-2px);
        }

        .op {
            background: var(--op);
        }

        .fn {
            background: var(--fn);
        }

        .equal {
            background: var(--equal);
            color: #fff;
            grid-column: span 2;
        }

        .danger {
            background: var(--danger);
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h2 class="title">Scientific Calculator</h2>
        <input id="display" class="display" type="text" readonly value="">

        <div class="keys">
            <button class="danger" onclick="clearDisplay()">AC</button>
            <button class="danger" onclick="deleteLast()">DEL</button>
            <button class="fn" onclick="appendValue('(')">(</button>
            <button class="fn" onclick="appendValue(')')">)</button>
            <button class="op" onclick="appendValue('%')">%</button>

            <button class="fn" onclick="applyFunction('sin')">sin</button>
            <button class="fn" onclick="applyFunction('cos')">cos</button>
            <button class="fn" onclick="applyFunction('tan')">tan</button>
            <button class="fn" onclick="applyFunction('log')">log</button>
            <button class="fn" onclick="applyFunction('ln')">ln</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="op" onclick="appendValue('/')">/</button>
            <button class="fn" onclick="applyFunction('sqrt')">sqrt</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="op" onclick="appendValue('*')">*</button>
            <button class="fn" onclick="squareValue()">x^2</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="op" onclick="appendValue('-')">-</button>
            <button class="fn" onclick="appendValue(Math.PI.toFixed(8))">PI</button>

            <button onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
            <button class="fn" onclick="appendValue(Math.E.toFixed(8))">e</button>
            <button class="op" onclick="appendValue('+')">+</button>
            <button class="equal" onclick="calculateResult()">=</button>
        </div>
    </div>

    <script>
        const display = document.getElementById("display");

        function appendValue(value) {
            display.value += value;
        }

        function clearDisplay() {
            display.value = "";
        }

        function deleteLast() {
            display.value = display.value.slice(0, -1);
        }

        function calculateResult() {
            try {
                if (display.value.trim() === "") return;
                const result = Function("return (" + display.value + ")")();
                display.value = Number.isFinite(result) ? result : "Error";
            } catch (error) {
                display.value = "Error";
            }
        }

        function applyFunction(type) {
            const value = parseFloat(display.value);
            if (Number.isNaN(value)) {
                display.value = "Error";
                return;
            }

            let result;
            switch (type) {
                case "sin":
                    result = Math.sin(value * Math.PI / 180);
                    break;
                case "cos":
                    result = Math.cos(value * Math.PI / 180);
                    break;
                case "tan":
                    result = Math.tan(value * Math.PI / 180);
                    break;
                case "log":
                    result = value > 0 ? Math.log10(value) : NaN;
                    break;
                case "ln":
                    result = value > 0 ? Math.log(value) : NaN;
                    break;
                case "sqrt":
                    result = value >= 0 ? Math.sqrt(value) : NaN;
                    break;
                default:
                    result = NaN;
            }

            display.value = Number.isFinite(result) ? result : "Error";
        }

        function squareValue() {
            const value = parseFloat(display.value);
            if (Number.isNaN(value)) {
                display.value = "Error";
                return;
            }
            display.value = value * value;
        }
    </script>
</body>
</html>
